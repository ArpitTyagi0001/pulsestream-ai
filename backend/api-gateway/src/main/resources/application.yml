spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8084
          predicates:
            - Path=/auth-service/**
        - id: query-service
          uri: http://query-service:8083
          predicates:
            - Path=/api/dashboard/**
        - id: ai-service
          uri: http://ai-service:8085
          predicates:
            - Path=/api/ai/**
server:
  port: 8080
