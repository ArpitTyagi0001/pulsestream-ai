services:

  auth-db:
    image: postgres:16
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  event-db:
    image: postgres:16
    container_name: event-db
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - event_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  producer-service:
    image: producer-service
    container_name: producer-service
    depends_on:
      - kafka
    ports:
      - "8081:8081"

  consumer-service:
    image: consumer-service
    container_name: consumer-service
    depends_on:
      - kafka
      - event-db
    ports:
      - "8082:8082"

  query-service:
    image: query-service
    container_name: query-service
    depends_on:
      - event-db
      - redis
    ports:
      - "8083:8083"

  auth-service:
    image: auth-service
    container_name: auth-service
    depends_on:
      - auth-db
    ports:
      - "8084:8084"

  ai-service:
    image: ai-service
    container_name: ai-service
    depends_on:
      - ollama
      - query-service
    ports:
      - "8085:8085"

  api-gateway-service:
    image: api-gateway-service
    container_name: api-gateway
    depends_on:
      - auth-service
      - query-service
      - ai-service
    ports:
      - "8080:8080"

  dashboard:
    image: dashboard
    container_name: dashboard
    depends_on:
      - api-gateway-service
    ports:
      - "5173:5173"

volumes:
  auth_db_data:
  event_db_data:
  ollama_data: