spring:
  application:
    name: api-gateway


  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8084
          predicates:
            - Path=/auth-service/**

        - id: query-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/dashboard/**

        - id: ai-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ai/**

server:
     port: 8080

